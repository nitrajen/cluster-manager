command:
  - uvicorn
  - app:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  # Your Databricks workspace URL
  - name: DATABRICKS_HOST
    value: "https://YOUR-WORKSPACE.cloud.databricks.com"

  # Delta table location — table will be created as {DELTA_CATALOG}.{DELTA_SCHEMA}.node_metrics
  - name: DELTA_CATALOG
    value: "main"
  - name: DELTA_SCHEMA
    value: "cluster_manager"

  # SQL Warehouse used to write to Delta (leave blank to auto-discover)
  # Serverless warehouse strongly recommended — cold starts are ~2s vs 1-3 min
  - name: SQL_WAREHOUSE_ID
    value: ""

  # Service Principal UUID(s) allowed to push metrics (comma-separated)
  # Get from: Databricks UI > Settings > Identity > Service Principals
  - name: OTEL_ALLOWED_SP_IDS
    value: "YOUR-SP-UUID"

  # Set to "true" to skip auth checks during initial testing
  - name: OTEL_AUTH_DISABLED
    value: "false"

command:
  - uvicorn
  - cluster_manager.backend.app:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: CLUSTER_MANAGER_APP_NAME
    value: "Cluster Manager"
  - name: DATABRICKS_HOST
    value: "https://fevm-serverless-stable-3n0ihb.cloud.databricks.com"
  - name: LAKEBASE_HOST
    value: "ep-quiet-butterfly-d2kf7bwg.database.us-east-1.cloud.databricks.com"
  - name: LAKEBASE_DATABASE
    value: "otel_metrics"
  - name: LAKEBASE_USER
    value: "laurent.prat@databricks.com"
  - name: LAKEBASE_PROJECT
    value: "cluster-metrics"
  - name: LAKEBASE_BRANCH
    value: "production"
  - name: LAKEBASE_ENDPOINT
    value: "primary"
  - name: DATABRICKS_PROFILE
    value: ""
  - name: OTEL_AUTH_DISABLED
    value: "false"
  - name: OTEL_ALLOWED_SP_IDS
    value: "682e907b-4c32-463f-8b49-01617b942f17"
  - name: REGISTERED_WORKSPACES
    value: ""

# Request additional OAuth scopes for the user token
user_api_scopes:
  - compute.clusters:read
  - compute.clusters:manage
  - compute.cluster-policies:read
  - sql.statement-execution:execute

